name: Build and release web app

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
        default: "v0.0.0"
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: "npm"
      - name: Authenticate NPM registry
        run: echo -e "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}\n@capawesome-team:registry=https://npm.pkg.github.com/" > ~/.npmrc
      - name: Add Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDS }}' > ./src/firebase.json
      - name: Write release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VITE_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Production build
        env:
          VITE_GOOGLE_STORE_API: ${{ secrets.VITE_GOOGLE_STORE_API }}
          VITE_APPLE_STORE_API: ${{ secrets.VITE_APPLE_STORE_API }}
        run: npm run build
      - name: Production build (core)
        env:
          VITE_GOOGLE_STORE_API: ${{ secrets.VITE_GOOGLE_STORE_API }}
          VITE_APPLE_STORE_API: ${{ secrets.VITE_APPLE_STORE_API }}
        run: npm run build:core
      - name: Package release tarballs
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tar czvf "zaparoo_app-web-${VERSION}.tar.gz" -C ./dist .
          tar czvf "zaparoo_app-web-core-${VERSION}.tar.gz" -C ./dist-core .
      - name: Generate SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: "zaparoo_app-web-*.tar.gz"
      - name: Attest SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: "zaparoo_app-web-*.tar.gz"
          sbom-path: sbom.spdx.json
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            zaparoo_app-web-*.tar.gz
            sbom.spdx.json
          fail_on_unmatched_files: true
          make_latest: false
