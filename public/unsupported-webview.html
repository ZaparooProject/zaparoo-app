<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unsupported Android WebView</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #111928;
        color: #f9fafb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        max-width: 520px;
      }

      h1 {
        font-size: 1.5rem;
        line-height: 1.2;
        margin: 0 0 16px;
      }

      p {
        color: #d1d5db;
        line-height: 1.5;
        margin: 0 0 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Android WebView update required</h1>
      <p>
        Zaparoo requires a newer Android System WebView or Chrome before it can
        start safely.
      </p>
      <p>
        Update Android System WebView or Chrome from Google Play, then restart
        Zaparoo. If updates are unavailable, update device firmware.
      </p>
    </main>
  </body>
</html>
